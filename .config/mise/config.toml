# mise configuration for xtemplate.
#
# Tooling is pinned here so local and CI runs use identical versions, and tasks
# live as standalone Nushell scripts under .config/mise/tasks/ (parse-checkable
# with `nu --ide-check`, runnable on their own). Run `mise tasks` to list them,
# `mise run <task>` to execute one, and `mise run ci` for the full pipeline.

[tools]
go = "1.25"
hurl = "latest"
"aqua:nushell/nushell" = "latest"
golangci-lint = "latest"
"go:github.com/caddyserver/xcaddy/cmd/xcaddy" = "latest"

[tasks.lint]
description = "Run lint checks"
depends = ["lint-nu", "lint-go"]

[tasks.test]
description = "Run all tests and lints"
depends = ["lint", "gotest", "test-caddy", "test-cli", "test-docker"]

# The full pipeline. `depends` run first (in parallel where independent); only
# if they all succeed do the `depends_post` artifact builds run. This replaces
# the CUE `pass` gate.
[tasks.ci]
description = "Full pipeline: lint + test every target, then build artifacts"
depends = ["test"]
depends_post = ["dist", "build-docker"]

[settings.task]
output = "keep-order"
