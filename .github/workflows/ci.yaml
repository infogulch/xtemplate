name: ci

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags so `git describe` can derive the version.
          fetch-depth: 0

      # Installs tools pinned by mise, from cache if available
      - uses: jdx/mise-action@v4

      # prebuild exports the Docker deps cache via `--cache-to type=local`, which
      # the default docker driver only supports with the containerd image store.
      # GitHub runners ship with it disabled, so enable it before any build. This
      # keeps the default driver (images still load into the store for
      # `docker run`/`docker push`), unlike switching to a docker-container builder.
      - name: Enable containerd image store
        run: |
          echo '{ "features": { "containerd-snapshotter": true } }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Save/restore prebuild cache
        uses: ./.github/actions/ci-cache

      - name: Check secrets availability
        id: secrets_available
        continue-on-error: true
        run: |
          [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ] && echo "::error::Secrets unavailable" && exit 1 || exit 0
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: ${{ steps.secrets_available.conclusion == 'success' }}
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: mise run ci

      - name: Push Docker image
        if: ${{ startsWith(github.ref, 'refs/tags/v') && steps.secrets_available.conclusion == 'success' }}
        run: mise run push-docker

      - name: Archive test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: logs
          path: |
            dist/**/*.log
            dist/**/report/

      - uses: infogulch/upload-zip-artifacts@v1
        with:
          path: "dist/*.zip"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: "dist/*.zip"
