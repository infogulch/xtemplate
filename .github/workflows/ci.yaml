name: ci

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` can derive the version.
          fetch-depth: 0

      # Installs every tool pinned in .config/mise/config.toml (go, hurl,
      # shellcheck, xcaddy) and caches them.
      - uses: jdx/mise-action@v2

      - name: Check secrets availability
        id: secrets_available
        continue-on-error: true
        run: |
          [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ] && echo "::error::Secrets unavailable" && exit 1 || exit 0
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: ${{ steps.secrets_available.conclusion == 'success' }}
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # lint + gotest + test {cli,caddy,docker}, then dist + build-docker.
      - run: mise run ci

      - name: Push Docker image
        if: ${{ startsWith(github.ref, 'refs/tags/v') && steps.secrets_available.conclusion == 'success' }}
        run: mise run push-docker

      - name: Archive test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: |
            dist/**/*.log
            dist/**/report/

      - uses: actions/upload-artifact@v4
        with:
          name: xtemplate-amd64-linux
          path: "dist/xtemplate-amd64-linux/*"

      - uses: actions/upload-artifact@v4
        with:
          name: xtemplate-amd64-darwin
          path: "dist/xtemplate-amd64-darwin/*"

      - uses: actions/upload-artifact@v4
        with:
          name: xtemplate-amd64-windows
          path: "dist/xtemplate-amd64-windows/*"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: "dist/*.zip"
