<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>My Blog</title>
{{- with $hash := .X.StaticFileHash `/assets/style.css`}}
<link rel="stylesheet" href="/assets/style.css?hash={{$hash}}" integrity="{{$hash}}">
{{- end}}
</head>
<body>
<h1>My Blog</h1>
<ul>
{{- range .DB.QueryRows `SELECT slug, title, summary FROM posts ORDER BY date DESC`}}
<li>
<a href="/posts/{{.slug}}">{{.title}}</a> - {{.summary}}
</li>
{{- end}}
</ul>
</body>
</html>
